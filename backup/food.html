<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Food & Drink · Telemark Adventures</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="is-hidden">
  <!-- Header / Navigation -->
  <header class="site-header">
    <div class="container">
      <a class="logo" href="index.html">Telemark<span>Adventures</span></a>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="hiking.html">Hiking</a>
        <a href="skiing.html">Skiing</a>
        <a href="camping.html">Camping</a>
        <a href="events.html">Events</a>
        <a href="food.html">Dining</a>
        <a href="#gallery">Gallery</a>
        <a href="#contact">Contact</a>
        <button class="theme-toggle" aria-label="Toggle dark mode" title="Toggle theme">Dark mode</button>
      </nav>
    </div>
  </header>

  <!-- Hero -->
  <section class="hero parallax hero-food" data-parallax-speed="0.25"
    style="--bg-image:url('images/kaffekanne.jpg'); background-image:url('images/kaffekanne.jpg'); background-repeat:no-repeat; background-size:cover; background-position:center;">
    <div class="hero-inner">
      <h1>Food & Drinks</h1>
      <p class="lead">Eat in and around Bø</p>
    </div>
    <div class="hero-overlay"></div>
  </section>

  <main class="section">
    <div class="container narrow">
      <!-- Filters -->
      <form id="food-filters" class="list-filters" aria-label="Filter places">
        <input type="search" name="q" placeholder="Search places…" autocomplete="off" />
        <select name="kind">
          <option value="">All types</option>
          <option value="restaurant">Restaurant</option>
          <option value="pub">Pub</option>
          <option value="takeaway">Takeaway</option>
          <option value="cafe">Café</option>
          <option value="bakery">Bakery</option>
        </select>
        <label class="switch">
          <input type="checkbox" name="open"> <span>Open now</span>
        </label>
        <label class="switch">
          <input type="checkbox" name="nearby">
          <span>Include nearby (≤15 min)</span>
        </label>
        <button type="button" id="clearFood" class="btn btn-ghost">Clear</button>
      </form>

      <!-- List -->
      <div id="food-list" class="card-list" aria-live="polite"></div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© <span id="year"></span> Telemark Adventures. Built with HTML, CSS, and vanilla JS.</p>
    </div>
  </footer>

  <script src="js/script.js"></script>
  <script src="js/food.js"></script>
</body>
</html>
